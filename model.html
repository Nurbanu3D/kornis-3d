<!DOCTYPE html>
<html>
<head>
  <title>3D Ürün Kataloğu</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    model-viewer {
      width: 80%;
      height: 80%;
    }
  </style>
</head>
<body>

<model-viewer 
 <model-viewer 
  src="kornis.glb"
  auto-rotate
  camera-controls
  environment-image="neutral"
  exposure="1.5"
  camera-orbit="0deg 75deg 2m"
  min-camera-orbit="auto auto 0.1m"
  max-camera-orbit="auto auto 10m">
</model-viewer>

</body>
</html>
