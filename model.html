<!DOCTYPE html>
<html>
<head>
  <title>3D Ürün Kataloğu</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    model-viewer {
      width: 80%;
      height: 80%;
    }
  </style>
</head>
<body>

<model-viewer 
  src="https://raw.githubusercontent.com/Nurbanu3D/kornis-3d/main/kornis.glb"
  auto-rotate
  camera-controls
  environment-image="neutral"
  exposure="1.2"
  shadow-intensity="1"
  camera-orbit="0deg 75deg 2m"
  style="width:100%; height:100vh;">
</model-viewer>

</body>
</html>
